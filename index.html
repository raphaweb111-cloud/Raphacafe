<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Menu</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 20px;
      margin: 40px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
    }
    .menu {
      text-align: left;
      margin-top: 20px;
    }
    .menu p {
      display: flex;
      justify-content: space-between;
    }
    img {
      margin-top: 20px;
      width: 150px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>My Restaurant</h1>

  <div class="menu">
    <h3>Menu</h3>
    <p><span>Pizza</span> <span>Rs. 500</span></p>
    <p><span>Burger</span> <span>Rs. 250</span></p>
    <p><span>Momo</span> <span>Rs. 150</span></p>
    <p><span>Tea</span> <span>Rs. 50</span></p>
  </div>

  <h3>Scan to Order</h3>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://yourwebsite.com" alt="QR Code">

</div>

</body>
</html>
